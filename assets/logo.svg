<svg width="820" height="160" viewBox="0 0 820 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="bounds">
      <rect width="820" height="160" rx="10"/>
    </clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="820" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="160" fill="url(#bg)" rx="10"/>

  <!-- Expanding rings, clipped to card bounds, centered left -->
  <g clip-path="url(#bounds)">
    <circle cx="80" cy="80" r="72" fill="none" stroke="#1f6feb" stroke-width="1.5" opacity="0.14"/>
    <circle cx="80" cy="80" r="50" fill="none" stroke="#1f6feb" stroke-width="2"   opacity="0.28"/>
    <circle cx="80" cy="80" r="30" fill="none" stroke="#1f6feb" stroke-width="2.5" opacity="0.50"/>
    <circle cx="80" cy="80" r="12" fill="#1f6feb" opacity="0.85"/>
    <circle cx="80" cy="80" r="5"  fill="#58a6ff"/>
  </g>

  <!-- Divider -->
  <line x1="162" y1="32" x2="162" y2="128" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="186" y="76"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="46" font-weight="800" letter-spacing="-0.5"
        fill="#f0f6fc">Big Picture</text>

  <!-- Tagline -->
  <text x="188" y="112"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="15.5" fill="#8b949e" letter-spacing="0.2">
    Zoom out. Understand what&#x2019;s really happening. Act on what matters.
  </text>
</svg>
